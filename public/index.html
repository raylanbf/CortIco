<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Ícones</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f11;
      color: #e2e2e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: #1a1a1f;
      border: 1px solid #2a2a32;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .header {
      margin-bottom: 32px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo svg { width: 26px; height: 26px; fill: #fff; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f4f4f8;
      letter-spacing: -.3px;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: #72727e;
      line-height: 1.5;
    }

    /* Drop zone */
    .drop-zone {
      display: block;
      border: 2px dashed #2e2e3a;
      border-radius: 14px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      background: #13131a;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #6366f1;
      background: rgba(99,102,241,.06);
    }

    .drop-zone input[type=file] {
      opacity: 0;
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    .drop-icon {
      width: 44px;
      height: 44px;
      background: #222230;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }

    .drop-icon svg { width: 22px; height: 22px; stroke: #6366f1; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .drop-title {
      font-size: 14px;
      font-weight: 600;
      color: #c4c4cc;
    }

    .drop-sub {
      margin-top: 4px;
      font-size: 12px;
      color: #52525e;
    }

    /* Preview */
    .preview-wrap {
      display: none;
      align-items: center;
      gap: 14px;
      background: #13131a;
      border: 1px solid #2e2e3a;
      border-radius: 14px;
      padding: 16px;
      margin-top: 16px;
    }

    .preview-wrap.visible { display: flex; }

    .preview-img {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: #222;
    }

    .preview-info { flex: 1; min-width: 0; }

    .preview-name {
      font-size: 13px;
      font-weight: 600;
      color: #d4d4dc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-size {
      margin-top: 3px;
      font-size: 11px;
      color: #52525e;
    }

    .preview-clear {
      background: none;
      border: none;
      color: #52525e;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color .15s;
    }

    .preview-clear:hover { color: #f87171; }
    .preview-clear svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    /* Platforms */
    .platforms {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 24px;
    }

    .platform {
      background: #13131a;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .platform-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .platform-icon svg { width: 18px; height: 18px; }

    .p-android .platform-icon { background: rgba(61,220,132,.12); }
    .p-android .platform-icon svg { fill: #3ddc84; }
    .p-ios .platform-icon { background: rgba(255,255,255,.06); }
    .p-ios .platform-icon svg { fill: #c0c0c8; }
    .p-chrome .platform-icon { background: rgba(66,133,244,.12); }
    .p-chrome .platform-icon svg { fill: #4285f4; }
    .p-web .platform-icon { background: rgba(251,191,36,.1); }
    .p-web .platform-icon svg { fill: #fbbf24; }

    .platform-label {
      font-size: 12px;
      font-weight: 600;
      color: #a0a0b0;
    }

    .platform-count {
      font-size: 11px;
      color: #52525e;
      margin-top: 1px;
    }

    /* Submit */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover:not(:disabled) { opacity: .9; }
    .btn:active:not(:disabled) { transform: scale(.99); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Loading state */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn.loading .btn-icon { display: none; }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text::after { content: '…'; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #2a2a35;
      border: 1px solid #3a3a48;
      color: #e2e2e6;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error { border-color: #f87171; color: #fca5a5; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
    </div>
    <h1>Gerador de Ícones</h1>
    <p class="subtitle">Gera todos os tamanhos para Android, iOS, Chrome e Web a partir de uma única imagem.</p>
  </div>

  <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">

    <label class="drop-zone" id="dropZone" for="image">
      <input type="file" id="image" name="image" accept="image/png,image/jpeg" required />
      <div class="drop-icon">
        <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
      </div>
      <div class="drop-title">Arraste, cole (Ctrl+V) ou clique para escolher</div>
      <div class="drop-sub">PNG ou JPG — recomendado imagem quadrada</div>
    </label>

    <div class="preview-wrap" id="previewWrap">
      <img class="preview-img" id="previewImg" src="" alt="preview" />
      <div class="preview-info">
        <div class="preview-name" id="previewName"></div>
        <div class="preview-size" id="previewSize"></div>
      </div>
      <button type="button" class="preview-clear" id="clearBtn" title="Remover">
        <svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
      </button>
    </div>

    <div class="platforms">
      <div class="platform p-android">
        <div class="platform-icon">
          <svg viewBox="0 0 24 24"><path d="M6 18c0 .55.45 1 1 1h1v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h2v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h1c.55 0 1-.45 1-1V8H6v10zm-2.5-1C2.67 17 2 17.67 2 18.5v-9C2 8.67 2.67 8 3.5 8S5 8.67 5 9.5v9c0 .83-.67 1.5-1.5 1.5zm17 0c-.83 0-1.5-.67-1.5-1.5v-9C19 8.67 19.67 8 20.5 8S22 8.67 22 9.5v9c0 .83-.67 1.5-1.5 1.5zM15.53 2.16l1.3-1.3c.2-.2.2-.51 0-.71-.2-.2-.51-.2-.71 0l-1.48 1.48A5.84 5.84 0 0012 1c-.96 0-1.86.23-2.66.63L7.85.15c-.2-.2-.51-.2-.71 0-.2.2-.2.51 0 .71l1.31 1.31C7.03 3.07 6 4.51 6 6.22V7h12v-.78c0-1.71-1.03-3.15-2.47-4.06zM10 5H9V4h1v1zm5 0h-1V4h1v1z"/></svg>
        </div>
        <div>
          <div class="platform-label">Android</div>
          <div class="platform-count">11 tamanhos</div>
        </div>
      </div>

      <div class="platform p-ios">
        <div class="platform-icon">
          <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        </div>
        <div>
          <div class="platform-label">iOS</div>
          <div class="platform-count">13 tamanhos</div>
        </div>
      </div>

      <div class="platform p-chrome">
        <div class="platform-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="10" fill="none" stroke="#4285f4" stroke-width="2"/><line x1="12" y1="8" x2="21.5" y2="8" stroke="#4285f4" stroke-width="2"/><line x1="12" y1="8" x2="3" y2="20" stroke="#4285f4" stroke-width="2"/><line x1="21" y1="16" x2="3" y2="16" stroke="#4285f4" stroke-width="2"/></svg>
        </div>
        <div>
          <div class="platform-label">Chrome</div>
          <div class="platform-count">4 tamanhos</div>
        </div>
      </div>

      <div class="platform p-web">
        <div class="platform-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        </div>
        <div>
          <div class="platform-label">Web / PWA</div>
          <div class="platform-count">9 tamanhos</div>
        </div>
      </div>
    </div>

    <button type="submit" class="btn" id="submitBtn" disabled>
      <div class="spinner"></div>
      <svg class="btn-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="btn-text">Gerar e baixar .zip</span>
    </button>

  </form>
</div>

<div class="toast" id="toast"></div>

<script>
  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('image');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const previewName = document.getElementById('previewName');
  const previewSize = document.getElementById('previewSize');
  const clearBtn   = document.getElementById('clearBtn');
  const submitBtn  = document.getElementById('submitBtn');
  const form       = document.getElementById('uploadForm');
  const toast      = document.getElementById('toast');

  let toastTimer;

  function showToast(msg, isError = false) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error' : '');
    toastTimer = setTimeout(() => toast.className = 'toast', 3500);
  }

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }

  function setFile(file) {
    if (!file) return;
    if (!['image/png', 'image/jpeg'].includes(file.type)) {
      showToast('Use uma imagem PNG ou JPG.', true);
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      previewName.textContent = file.name;
      previewSize.textContent = formatBytes(file.size);
      previewWrap.classList.add('visible');
      submitBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

  document.addEventListener('paste', e => {
    const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
    if (item) setFile(item.getAsFile());
  });

  clearBtn.addEventListener('click', () => {
    fileInput.value = '';
    previewWrap.classList.remove('visible');
    previewImg.src = '';
    submitBtn.disabled = true;
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      setFile(file);
    }
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    try {
      const fd = new FormData(form);
      const res = await fetch('/upload', { method: 'POST', body: fd });
      if (!res.ok) {
        const msg = await res.text();
        throw new Error(msg || 'Erro ao gerar ícones.');
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'icon-pack.zip';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Download iniciado com sucesso!');
    } catch (err) {
      showToast(err.message, true);
    } finally {
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
